name: Release
# CELLM Release Workflow
# Website: https://cellm.ai
# Repository: https://github.com/murillodutt/cellm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v3.3.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate plugin structure
        run: |
          # Validate all plugin manifests
          for plugin in cellm docops dse; do
            manifest="${plugin}/.claude-plugin/plugin.json"
            if [ ! -f "$manifest" ]; then
              echo "::error::Missing ${manifest}"
              exit 1
            fi
            python3 -c "import json; d=json.load(open('${manifest}')); assert 'skills' in d" || exit 1
            echo "[+] ${manifest} valid"
          done

          # Validate marketplace
          python3 -c "
          import json
          mp = json.load(open('.claude-plugin/marketplace.json'))
          names = [p['name'] for p in mp['plugins']]
          for expected in ['cellm', 'docops', 'dse']:
              assert expected in names, f'Missing {expected}'
          print('[+] marketplace.json valid:', names)
          "

          # Validate hooks and MCP
          for f in cellm/hooks/hooks.json cellm/.mcp.json.example; do
            python3 -c "import json; json.load(open('$f'))" || exit 1
            echo "[+] $f valid"
          done

          # No commands directories
          for plugin in cellm docops dse; do
            if [ -d "${plugin}/commands" ]; then
              echo "::error::Found obsolete commands/ in ${plugin}"
              exit 1
            fi
          done
          echo "[+] Skills-only architecture confirmed"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi

          FEAT=$(echo "$COMMITS" | grep "^- feat" || true)
          FIX=$(echo "$COMMITS" | grep "^- fix" || true)
          DOCS=$(echo "$COMMITS" | grep "^- docs" || true)
          REFACTOR=$(echo "$COMMITS" | grep "^- refactor" || true)
          OTHER=$(echo "$COMMITS" | grep -v "^- feat\|^- fix\|^- docs\|^- refactor" || true)

          CHANGELOG=""
          if [ -n "$FEAT" ]; then CHANGELOG="${CHANGELOG}### Features\n${FEAT}\n\n"; fi
          if [ -n "$FIX" ]; then CHANGELOG="${CHANGELOG}### Bug Fixes\n${FIX}\n\n"; fi
          if [ -n "$DOCS" ]; then CHANGELOG="${CHANGELOG}### Documentation\n${DOCS}\n\n"; fi
          if [ -n "$REFACTOR" ]; then CHANGELOG="${CHANGELOG}### Refactoring\n${REFACTOR}\n\n"; fi
          if [ -n "$OTHER" ]; then CHANGELOG="${CHANGELOG}### Other Changes\n${OTHER}\n\n"; fi

          echo -e "$CHANGELOG" > changelog.md

      - name: Count artifacts
        id: count
        run: |
          echo "cellm_skills=$(find cellm/skills -name 'SKILL.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "docops_skills=$(find docops/skills -name 'SKILL.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "dse_skills=$(find dse/skills -name 'SKILL.md' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "agents=$(find cellm/agents docops/agents -name '*.md' 2>/dev/null | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT
          echo "scripts=$(find cellm/scripts -name '*.sh' | wc -l | tr -d ' ')" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: CELLM ${{ steps.version.outputs.version }}
          body: |
            ## CELLM ${{ steps.version.outputs.version }}

            Context Engineering for LLM-driven development. Skills-only architecture.

            ### Plugin Inventory

            | Plugin | Skills | Description |
            |--------|--------|-------------|
            | cellm | ${{ steps.count.outputs.cellm_skills }} | Core development (context + workflow) |
            | docops | ${{ steps.count.outputs.docops_skills }} | Documentation maintenance |
            | dse | ${{ steps.count.outputs.dse_skills }} | Design system engine |

            | Component | Count |
            |-----------|-------|
            | Agents | ${{ steps.count.outputs.agents }} |
            | Scripts | ${{ steps.count.outputs.scripts }} |

            ### Changelog

            $(cat changelog.md)

            ---

            ### Installation

            ```bash
            /plugin marketplace add murillodutt/cellm
            /plugin install cellm
            ```
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
