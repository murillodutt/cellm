name: PR Check
# CELLM Pull Request Validation
# Website: https://cellm.ai
# Repository: https://github.com/murillodutt/cellm

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-validation:
    name: Validate PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check PR title format
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"

          # Check for conventional commit format
          if [[ ! "$PR_TITLE" =~ ^(feat|fix|docs|refactor|test|chore)(\([a-z-]+\))?:\ .+ ]]; then
            echo "::error::PR title must follow conventional commit format: type(scope): description"
            echo "Valid types: feat, fix, docs, refactor, test, chore"
            echo "Valid scopes: skills, agents, hooks, scripts, docs, dse, docops"
            exit 1
          fi

          echo "[+] PR title format is valid"

      - name: Detect file types changed
        id: changes
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1

          SKILLS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "^(cellm|docops|dse)/skills/" | wc -l | tr -d ' ')
          AGENTS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "^(cellm|docops)/agents/" | wc -l | tr -d ' ')
          HOOKS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "^(cellm|docops)/hooks/" | wc -l | tr -d ' ')
          SCRIPTS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "^(cellm|docops)/scripts/" | wc -l | tr -d ' ')
          DOCS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep "^\.github/" | wc -l | tr -d ' ')

          echo "skills=$SKILLS" >> $GITHUB_OUTPUT
          echo "agents=$AGENTS" >> $GITHUB_OUTPUT
          echo "hooks=$HOOKS" >> $GITHUB_OUTPUT
          echo "scripts=$SCRIPTS" >> $GITHUB_OUTPUT
          echo "docs=$DOCS" >> $GITHUB_OUTPUT

      - name: Generate PR summary
        run: |
          echo "## PR Change Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Files Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|---------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Skills | ${{ steps.changes.outputs.skills }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agents | ${{ steps.changes.outputs.agents }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Hooks | ${{ steps.changes.outputs.hooks }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scripts | ${{ steps.changes.outputs.scripts }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ steps.changes.outputs.docs }} |" >> $GITHUB_STEP_SUMMARY

  structure-check:
    name: Check Plugin Structure
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate plugin manifests
        run: |
          for plugin in cellm docops dse; do
            manifest="${plugin}/.claude-plugin/plugin.json"
            if [ ! -f "$manifest" ]; then
              echo "::error::Missing ${manifest}"
              exit 1
            fi
            if ! python3 -c "import json; json.load(open('${manifest}'))"; then
              echo "::error::Invalid JSON in ${manifest}"
              exit 1
            fi
            echo "[+] ${manifest} valid"
          done

      - name: Validate marketplace.json
        run: |
          if [ ! -f ".claude-plugin/marketplace.json" ]; then
            echo "::error::Missing marketplace.json"
            exit 1
          fi
          python3 -c "
          import json
          mp = json.load(open('.claude-plugin/marketplace.json'))
          names = [p['name'] for p in mp['plugins']]
          for expected in ['cellm', 'docops', 'dse']:
              assert expected in names, f'Missing {expected} in marketplace.json'
          print('[+] marketplace.json valid:', names)
          "

      - name: Validate cellm hooks and MCP
        run: |
          for f in cellm/hooks/hooks.json cellm/.mcp.json.example; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing $f"
              exit 1
            fi
            if ! python3 -c "import json; json.load(open('$f'))"; then
              echo "::error::Invalid JSON in $f"
              exit 1
            fi
            echo "[+] $f valid"
          done

  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add labels based on changes
        uses: actions/github-script@v8
        with:
          script: |
            const { execSync } = require('child_process');

            // Get changed files
            const changedFiles = execSync(
              `git diff --name-only origin/${{ github.base_ref }}...HEAD`
            ).toString().split('\n').filter(f => f);

            const labels = new Set();

            // Determine labels based on file paths
            for (const file of changedFiles) {
              if (file.match(/^(cellm|docops|dse)\/skills\//)) labels.add('skills');
              if (file.match(/^(cellm|docops)\/agents\//)) labels.add('agents');
              if (file.match(/^(cellm|docops)\/hooks\//)) labels.add('hooks');
              if (file.match(/^(cellm|docops)\/scripts\//)) labels.add('scripts');
              if (file.startsWith('.github/')) labels.add('documentation');
              if (file.startsWith('docops/')) labels.add('docops');
              if (file.startsWith('dse/')) labels.add('dse');
            }

            // Add labels if any found
            if (labels.size > 0) {
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  labels: Array.from(labels)
                });
                console.log(`Added labels: ${Array.from(labels).join(', ')}`);
              } catch (error) {
                console.log(`Could not add labels: ${error.message}`);
              }
            }
