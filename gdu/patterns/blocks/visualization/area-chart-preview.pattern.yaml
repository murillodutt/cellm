id: area-chart-preview
name: Area Chart Revenue Preview
version: "1.1.0"
catalogRef: area-chart-preview
category: visualization
tags: [area, chart, preview, revenue, dual-series, summary, badge, responsive]
basePattern: area-chart-gradient
archetype: chart-heavy
description: >
  Compact revenue preview card with dual-series area chart (desktop/mobile),
  currency-formatted total with percentage change badge, series totals footer
  with animated color indicators, and a "View Details" CTA. Nested card layout
  with dashed grid lines and MonotoneX curve interpolation.

requires:
  components: [UCard, UIcon, UBadge, UButton]
  charts: [AreaChart]
  composables: [useResponsiveHeight, useColorMode]

props:
  interface: |
    interface AreaChartItem {
      month: string
      desktop: number
      mobile: number
    }
    interface AreaChartPreviewProps {
      data: AreaChartItem[]
      categories: ComputedRef<Record<string, BulletLegendItemInterface>>
      title?: string
      percentChange?: string
      currency?: string
      locale?: string
    }

emits:
  interface: |
    interface AreaChartPreviewEmits {
      'view-details': []
      'series:hover': [seriesKey: string, value: number]
    }

layout:
  structure: |
    card-shell (variant=subtle, bg-default/60)
      content-stack (space-y-4)
        metric-header (space-y-1)
          label-row (flex, gap-2, align-center)
            title-text (text-muted)
            info-icon (text-dimmed)
          value-row (flex, gap-4, align-center)
            total-value (text-3xl, font-semibold, tracking-tight)
            change-badge (UBadge, variant=soft, text-success)
        nested-chart-card (UCard, variant=soft)
          AreaChart (dashed grid, MonotoneX, hidden legend)
        series-footer (flex, justify-between)
          series-indicators (flex, gap-6)
            series-item (animated dot + label + value) x N
          action-area
            view-details-button (UButton, ghost, trailing arrow icon)
  responsive:
    mobile: chart height 120px, single column footer, stacked indicators
    tablet: chart height 240px, inline footer
    desktop: chart height 240px, spacious layout

slots:
  header: Override metric header with title and total
  chart: Override the nested chart card content
  footer: Override series indicators and action area

tokens:
  card-bg: bg-default/60
  card-variant: subtle
  nested-card-variant: soft
  title-color: text-muted
  info-icon-color: text-dimmed
  total-font: text-3xl font-semibold tracking-tight
  badge-variant: soft
  badge-color: text-success
  indicator-dot: h-2 w-2 animate-pulse rounded-full
  label-color: text-muted dark:text-dimmed
  value-font: font-medium
  grid-dash: "--vis-axis-grid-line-dasharray: 5 5"

chartConfig:
  type: area
  curveType: MonotoneX
  gradient: true
  tooltip: true
  xAxis: true
  yAxis: true
  xGridLine: true
  xNumTicks: 6
  yNumTicks: 4
  hideLegend: true
  colorModeReactive: true

atomicHint:
  organism: AreaChartPreviewCard
  molecules: [MetricHeader, SeriesIndicatorBar, NestedChartContainer]
  atoms: [CurrencyTotal, PercentBadge, AnimatedDot, InfoIcon, ViewDetailsButton]

examples:
  - context: "SaaS revenue dashboard"
    data: "6-month revenue split by desktop ($1,341) and mobile ($748) channels with +21% growth badge"
  - context: "E-commerce traffic overview"
    data: "Quarterly sessions by device type with percentage change indicator and drill-down CTA"
  - context: "Ad platform spend preview"
    data: "Monthly ad spend across platforms with currency formatting and trend indicator"

composesWith:
  - "area-chart-gradient (same source, gradient-focused variant)"
  - "area-chart-data (same source, data-table variant)"
  - "Dashboard grid layout (DSE composition, preview cards row)"

avoid:
  - "Omitting the percentage change badge -- it provides at-a-glance trend context"
  - "Using a flat card instead of nested card for the chart -- the visual depth is a key differentiator"
  - "Removing animated dots from series indicators -- they signal live/recent data"
  - "Hardcoding currency format -- use Intl.NumberFormat with locale prop"
  - "Fixed chart height -- must use useResponsiveHeight(120/240)"

derivation:
  source: "nuxt-charts/area-charts/area-chart-preview"
  method: "structural-abstraction"
  what-was-kept: >
    Dual-series revenue preview concept with nested card layout, currency-formatted
    total via Intl.NumberFormat, percentage change UBadge, computed series totals
    with animated color dots, MonotoneX curve, dashed grid via CSS custom property,
    colorMode-reactive key, and trailing-icon "View Details" ghost button.
  what-was-removed: >
    Hardcoded desktop/mobile data array, specific hex colors (#3b82f6, #22c55e),
    static "+21%" text, inline style bindings for dot backgrounds.
  transformative-value: >
    Reusable revenue preview pattern for any dual-series temporal comparison with
    summary metrics, trend indicator, and drill-down navigation.
