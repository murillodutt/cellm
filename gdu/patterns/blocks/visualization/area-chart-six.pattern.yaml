id: area-chart-six
name: Area Chart Color Mode Reactive
version: "1.1.0"
catalogRef: area-chart-six
category: visualization
tags: [area, chart, color-mode, dark, light, reactive, dual-series, responsive]
basePattern: area-chart-gradient
archetype: chart-heavy
description: >
  Area chart card with color-mode reactivity. Chart re-renders on dark/light
  mode change via :key binding on colorMode.value. Categories use computed
  colors that can adapt to the active color scheme. Features the standard
  dual-series layout with MonotoneX curve and dashed grid lines.

requires:
  components: [UCard, UIcon, UBadge, UButton]
  charts: [AreaChart]
  composables: [useResponsiveHeight, useColorMode]

props:
  interface: |
    interface AreaChartItem {
      month: string
      desktop: number
      mobile: number
    }
    interface AreaChartSixProps {
      data: AreaChartItem[]
      categories: ComputedRef<Record<string, BulletLegendItemInterface>>
      title?: string
      percentChange?: string
    }

emits:
  interface: |
    interface AreaChartSixEmits {
      'view-details': []
      'colorMode:change': [mode: string]
    }

layout:
  structure: |
    card-shell (variant=subtle, bg-default/60)
      content-stack (space-y-4)
        header (space-y-1)
          label-row (flex, gap-2)
            title (text-muted)
            info-icon (text-dimmed)
          value-row (flex, gap-4)
            total (text-3xl, font-semibold)
            badge (UBadge, variant=soft)
        chart-card (UCard, variant=soft)
          AreaChart (:key=colorMode.value, MonotoneX, dashed grid)
        footer (flex, justify-between)
          indicators (flex, gap-6)
            series-item (dot + label + value) x N
          action (UButton, ghost)
  responsive:
    mobile: chart height 120px, stacked footer
    tablet: chart height 240px, inline
    desktop: chart height 240px, spacious

slots:
  header: Override header section
  chart: Override chart with color-mode-aware rendering
  footer: Override series indicators

tokens:
  card-bg: bg-default/60
  card-variant: subtle
  chart-variant: soft
  title-color: text-muted
  info-icon-color: text-dimmed
  total-font: text-3xl font-semibold tracking-tight
  badge-color: text-success
  indicator-dot: h-2 w-2 animate-pulse rounded-full
  series-label: text-muted dark:text-dimmed
  series-value: font-medium
  grid-dash: "--vis-axis-grid-line-dasharray: 5 5"

chartConfig:
  type: area
  curveType: MonotoneX
  gradient: true
  tooltip: true
  xAxis: true
  yAxis: true
  xGridLine: true
  xNumTicks: 6
  yNumTicks: 4
  hideLegend: true
  colorModeReactive: true
  keyBinding: "colorMode.value"

atomicHint:
  organism: ColorModeAreaCard
  molecules: [MetricHeader, ReactiveChartContainer, SeriesFooter]
  atoms: [ColorModeKey, CurrencyTotal, PercentBadge, AnimatedDot]

examples:
  - context: "Theme-aware analytics dashboard"
    data: "Revenue chart that re-renders with correct colors on dark/light toggle"
  - context: "Design system showcase"
    data: "Chart demonstrating color-mode adaptation for documentation"

composesWith:
  - "area-chart-gradient (same source, gradient emphasis)"
  - "area-chart-preview (same source, preview emphasis)"
  - "Dark/light toggle layout (DSE composition)"

avoid:
  - "Omitting :key=colorMode.value -- chart will not re-render on mode change"
  - "Using static hex colors in categories -- use computed colors or CSS variables"
  - "Ignoring dark mode contrast -- ensure text-muted/text-dimmed adapt properly"
  - "Hardcoding indicator dot backgrounds -- bind dynamically from categories"
  - "Fixed chart height -- use useResponsiveHeight"

derivation:
  source: "nuxt-charts/area-charts/area-chart-six"
  method: "structural-abstraction"
  what-was-kept: >
    Color-mode reactivity via :key="colorMode.value" on AreaChart, computed
    categories with useColorMode(), dual-series layout, MonotoneX curve,
    dashed grid, animated indicators, nested card hierarchy.
  what-was-removed: >
    Hardcoded data, specific hex colors, static text, inline styles.
  transformative-value: >
    Reusable color-mode-reactive chart pattern ensuring proper re-rendering
    and color adaptation on dark/light mode toggle.
