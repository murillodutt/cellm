id: bar-chart-seven
name: Multi-Series Color-Coded Bar Chart
version: 1.0.0
catalogRef: bar-chart-seven
category: visualization
tags:
  - bar
  - multi-series
  - color-coded
  - grouped
  - comparison
archetype: chart-heavy
description: >
  Multi-series grouped vertical bar chart with distinct color-coded series
  (e.g., indigo + pink). Similar to bar-chart-six but uses vibrant distinct
  hues instead of primary+accented palette. Compact card with header title,
  built-in legend, and y-grid lines.

requires:
  components: [UCard]
  charts: [BarChart]
  composables: [useResponsiveHeight]

props:
  interface: |
    interface RevenueDataPoint {
      month: string
      desktop: number
      mobile: number
    }
    interface BarChartSevenProps {
      data: RevenueDataPoint[]
      categories: Record<string, BulletLegendItemInterface>
      title?: string
      xNumTicks?: number
      radius?: number
    }

emits:
  interface: |
    interface BarChartSevenEmits {
      'bar:click': [month: string, series: string, value: number]
      'legend:toggle': [series: string, visible: boolean]
    }

layout:
  structure: |
    card-shell (max-w-2xl)
      header (UCard #header slot)
        title (text-lg font-semibold)
      chart-area
        BarChart (grouped, vertical, vibrant colors, legend top-right, y-grid)
  responsive:
    mobile: chart height 120px, 6 x-ticks
    tablet: chart height 240px
    desktop: max-w-2xl centered

slots:
  header: Override card header title
  chart: Override chart rendering
  footer: Add optional footer content

tokens:
  card-bg: bg-default
  title-text: text-lg font-semibold
  series-a: text-indigo-500
  series-b: text-pink-500
  bar-radius: radius-4
  group-padding: "0"
  bar-padding: "0.2"
  y-grid: visible
  legend-position: top-right

chartConfig:
  type: bar
  orientation: vertical
  stacked: false
  radius: 4
  groupPadding: 0
  barPadding: 0.2
  xNumTicks: 6
  hideLegend: false
  legendPosition: TopRight
  yGridLine: true
  tooltip: true
  legend: true
  xAxis: true
  yAxis: true

atomicHint:
  organism: ColorCodedBarChartCard
  molecules:
    - MinimalCardHeader (title in UCard header slot)
    - VibrantGroupedChart (distinct hue bars with legend)
    - BuiltInLegend (chart-native top-right)
  atoms:
    - ColorCodedBar
    - LegendEntry

examples:
  - context: Desktop vs Mobile revenue with distinct colors
    data: "12 months x desktop (indigo), mobile (pink) — vibrant contrast"
    usage: Marketing dashboard where color distinction matters for presentations
  - context: Product A vs Product B performance
    data: "Monthly comparison with high-contrast color coding for print/export"
    usage: Report-ready chart with distinct hues for accessibility

composesWith:
  - bar-chart-six (similar pattern with primary+accented palette)
  - bar-chart-grouped (base grouped pattern)
  - Dashboard Page Layout (DSE composition)

derivation:
  source: nuxt-charts/bar-charts/bar-chart-seven
  method: structural-abstraction
  what-was-kept: >
    Multi-series grouped bars with vibrant distinct color coding (indigo #6366f1
    + pink #ec4899), compact max-w-2xl card, zero group padding, built-in legend
    at TopRight, y-grid lines, radius 4.
  what-was-removed: >
    All Vue template markup, hardcoded RevenueData array, specific color values,
    xFormatter, CSS classes.
  transformative-value: >
    Color-coded variant of multi-series comparison. Vibrant distinct hues provide
    better accessibility and print contrast than theme-variable colors.

avoid:
  - Using theme variables for series colors — vibrant distinct hues are the point
  - Stacking — this is a side-by-side comparison pattern
  - Large card width — max-w-2xl keeps bars readable at 12 categories
  - Low-contrast color pairs — series must be visually distinct
  - More than 2 series — the compact card cannot support wider clusters
