# Block Pattern: Password Reset
# Distributable structural specification — no licensed code
# Generated from catalog ref, not source transcription

id: password-reset
name: Password Reset Flow
version: "1.0.0"
catalogRef: password-reset
category: form
tags: [auth, password, reset, recovery, email, forgot-password]

archetype: form-heavy
description: >
  Two-state password reset flow: (1) email input form via UAuthForm to request
  a reset link, (2) success confirmation with UAlert and back-to-sign-in button.
  Loading state during submission. Single email field with mail icon on submit.

requires:
  components: [UCard, UAuthForm, UButton, UAlert, UIcon, NuxtLink]
  charts: []
  composables: [useToast]

props:
  interface: |
    interface PasswordResetProps {
      title?: string               // default "Reset your password"
      description?: string         // default "Enter your email to receive a reset link"
      submitLabel?: string         // default "Send reset link"
      submitIcon?: string          // default "i-lucide-mail"
      signInLink?: string          // URL for "Back to sign in"
      successTitle?: string        // default "Reset link sent!"
      successDescription?: string  // default "Check your email for instructions..."
    }

emits:
  interface: |
    interface PasswordResetEmits {
      'submit': [data: { email: string }]
      'back': []
    }

layout:
  structure: |
    card-shell (max-width ~384px, bg-default, padded)
      state-switcher (v-if sent)
        success-state
          alert (UAlert, success color, soft variant, check-circle icon)
            alert-title [success title]
            alert-description [check email instructions]
          back-button (outline variant, full-width, arrow-left icon)
        request-state (UAuthForm)
          title-slot [title text]
          description-slot [instructions, muted]
          field-list
            email-field (email, lg size, required, placeholder)
          submit-button (full-width, lg size, mail icon)
          footer-slot
            back-link (arrow-left icon + "Back to sign in", muted, centered)
            remember-prompt [text with sign-in link]
  responsive:
    mobile: full-width card, stacked content
    tablet: centered card, max-width 384px
    desktop: same as tablet

slots:
  footer: "Override back-to-sign-in navigation area"

tokens:
  card-bg: bg-default
  title-text: text-highlighted
  description-text: text-muted
  alert-color: success
  alert-variant: soft
  alert-icon: "i-lucide-check-circle"
  back-link-text: text-muted
  back-link-hover: "hover:text-primary"
  footer-text: text-dimmed
  link-text: text-primary
  submit-size: lg

atomicHint:
  organism: PasswordResetPage
  molecules: [ResetRequestForm, SuccessConfirmation, NavigationFooter]
  atoms: [EmailField, SuccessAlert, BackLink, RememberPrompt]

examples:
  - context: "SaaS account recovery"
    flow: "Email input -> success alert -> back to sign in"
  - context: "E-commerce password reset"
    flow: "Email input -> check email -> resend option"

composesWith:
  - "basic-sign-in (return destination after reset)"
  - "sign-up (alternate path from footer)"
  - "otp-verification (token verification step after email)"

derivation:
  source: "nuxt-charts/account/forgot-password"
  method: "structural-abstraction"
  what-was-kept: >
    Two-state flow pattern (request form vs success confirmation), UAuthForm
    with single email field, loading ref during submission, sent ref for
    state switching, UAlert success confirmation with check-circle icon,
    back-to-sign-in button with arrow-left icon, footer with back link
    and remember-password prompt, toast feedback on success.
  what-was-removed: >
    All Vue template markup, setTimeout mock API call, specific toast
    messages, inline CSS classes, hardcoded placeholder values.
  transformative-value: >
    Captures the two-state flow as a structural pattern: request state
    (form) transitions to success state (alert + navigation). Typed
    props for all text content. Reusable for any reset/verification flow.

avoid:
  - "No loading state — submit must show loading during API call"
  - "Missing success confirmation — never just redirect silently"
  - "No back navigation — user must return to sign in easily"
  - "Auto-redirect after success — let user read confirmation first"
  - "Missing email validation — required field with email type"
